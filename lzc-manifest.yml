lzc-sdk-version: '0.1'
package: fun.selfstudio.app.migration.gitnexus
version: 1.3.11
min_os_version: 1.3.8
name: GitNexus
description: (LazyCat Auto-build) Zero-Server Code Intelligence Engine - Client-side knowledge graph creator
license: PolyForm-Noncommercial
homepage: https://github.com/abhigyanpatwari/GitNexus
author: abhigyanpatwari
application:
  subdomain: gitnexus
  upstreams:
    - location: /
      backend: http://gitnexus:5173/
      disable_trim_location: true
services:
  gitnexus:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/lzcat-gitnexus:9196b19975f18d73
    environment:
      - NODE_ENV=production
      - BIND=0.0.0.0
    binds:
      - /lzcapp/var/data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
locales:
  en:
    name: GitNexus
    description: (LazyCat Auto-build) Zero-Server Code Intelligence Engine
  zh:
    name: GitNexus
    description: （懒猫微服自动构建）零服务器代码智能引擎
